{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado - MaqLogik SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'gestion/css/global.css' %}">
    <link rel="stylesheet" href="{% static 'gestion/css/password_reset.css' %}">
</head>
<body style="margin:0; font-family: 'Inter', sans-serif;">
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-icon">📤</div>
            <h2 class="reset-title">¡Correo Enviado!</h2>
            <p class="reset-text">
                Hemos enviado instrucciones para restablecer tu contraseña a la dirección de correo proporcionada.
                Por favor, verifica tu bandeja de entrada o la carpeta de SPAM.
            </p>
            
            <a href="{% url 'web_login' %}" class="btn-submit" style="display:inline-block; text-align:center; text-decoration:none;">
                Volver al Inicio
            </a>
        </div>
    </div>
</body>
</html>
