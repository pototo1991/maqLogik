{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Contraseña Actualizada! - MaqLogik SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'gestion/css/global.css' %}">
    <link rel="stylesheet" href="{% static 'gestion/css/password_reset.css' %}">
</head>
<body style="margin:0; font-family: 'Inter', sans-serif;">
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-icon" style="filter: drop-shadow(0 0 15px rgba(52, 211, 153, 0.4));">🎉</div>
            <h2 class="reset-title" style="color: #34d399;">Recuperación Exitosa</h2>
            <p class="reset-text">
                ¡Tu contraseña ha sido restablecida correctamente! A partir de ahora deberás utilizar esta nueva clave para acceder a tu plataforma MaqLogik.
            </p>
            
            <a href="{% url 'web_login' %}" class="btn-submit" style="display:inline-block; text-align:center; text-decoration:none; background: #34d399; box-shadow: 0 4px 15px rgba(52, 211, 153, 0.3);">
                Ir al Inicio de Sesión
            </a>
        </div>
    </div>
</body>
</html>
